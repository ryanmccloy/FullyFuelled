<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="js/Controller.js"></script>
    <title>Fully Fuelled</title>
  </head>
  <body>
    <section class="section hero">
      <div class="container hero-container">
        <div class="nav-bar">
          <div class="logo">Fully Fuelled</div>
          <div class="nav-links">
            <a href="#" class="nav-bar-link">Sign up</a>
            <a href="#" class="nav-bar-link">Log In</a>
            <a href="#" class="nav-bar-link my-trips-link hidden">My Trips</a>
          </div>
        </div>
        <h1 class="hero-heading">Where are you going?</h1>
        <form class="search-form">
          <input
            class="search-bar"
            type="text"
            name="location"
            autocomplete="off"
          />
          <button class="search-button" type="submit">Start Planning</button>
        </form>
        <div class="map"></div>
      </div>
    </section>
    <section class="section trip-stops">
      <div class="container"></div>
    </section>
  </body>
</html>
